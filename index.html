<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creative Flywheel</title>
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&f[]=satoshi@300,400,500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F9F7;--white:#fff;--ink:#0E0E0C;--ink2:#7A7A76;--ink3:#C4C4C0;
  --rose:#E8412A;--rose-bg:rgba(232,65,42,0.06);--rose-bd:rgba(232,65,42,0.15);
  --green:#16A34A;--border:#EAEAE6;--border2:#D4D4D0;--r:16px;
}
html,body{height:100%}
body{font-family:'Satoshi',-apple-system,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;height:100vh;overflow:hidden;-webkit-font-smoothing:antialiased;}

/* HEADER */
header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:56px;background:var(--white);border-bottom:1px solid var(--border);}
.logo{display:flex;align-items:center;gap:10px;}
.lmark{width:28px;height:28px;background:var(--ink);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.lmark svg{width:15px;height:15px;}
.lname{font-family:'Clash Display',sans-serif;font-size:14px;font-weight:500;letter-spacing:-0.2px;}
.hstatus{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:500;color:var(--ink3);}
.hdot{width:6px;height:6px;border-radius:50%;background:#22C55E;}

/* BODY */
.body{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* EMPTY */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;gap:20px;}
.etitle{font-family:'Clash Display',sans-serif;font-size:clamp(30px,5vw,46px);font-weight:500;line-height:1.05;letter-spacing:-2px;}
.etitle em{font-style:normal;color:var(--rose);}
.esub{font-size:14px;color:var(--ink2);line-height:1.7;max-width:340px;}

/* MODES */
.modes-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);margin-bottom:2px;}
.modes{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:560px;}
.mode{
  display:flex;align-items:center;gap:7px;
  padding:9px 16px;
  background:var(--white);border:1.5px solid var(--border);
  border-radius:24px;cursor:pointer;
  font-family:'Satoshi',sans-serif;font-size:13px;font-weight:500;color:var(--ink2);
  transition:all 0.15s;
}
.mode:hover{border-color:var(--border2);color:var(--ink);}
.mode.active{background:var(--ink);border-color:var(--ink);color:var(--white);}
.mode-icon{font-size:15px;line-height:1;}

/* MSGS */
.msgs{max-width:720px;width:100%;margin:0 auto;padding:28px 28px 12px;display:flex;flex-direction:column;gap:24px;}
.msg{display:flex;flex-direction:column;gap:6px;animation:up 0.22s ease both;}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-items:flex-end;}.msg.ai{align-items:flex-start;}
.who{font-size:10px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink3);padding:0 3px;}
.ubub{max-width:68%;background:var(--ink);color:#F9F9F7;border-radius:18px;border-bottom-right-radius:4px;padding:12px 18px;font-size:14px;line-height:1.6;}
.abub{background:var(--white);border:1px solid var(--border);border-radius:18px;border-bottom-left-radius:4px;padding:20px 22px;width:100%;box-shadow:0 2px 12px rgba(14,14,12,0.06);font-size:14px;line-height:1.7;color:var(--ink2);}

/* THINKING */
.think{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--white);border:1px solid var(--border);border-radius:14px;border-bottom-left-radius:4px;font-size:12px;font-weight:500;color:var(--ink3);width:fit-content;}
.dots{display:flex;gap:4px;}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--rose);opacity:0.3;animation:d 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:0.15s;}.dots span:nth-child(3){animation-delay:0.3s;}
@keyframes d{0%,80%,100%{opacity:0.2;transform:scale(0.8)}40%{opacity:1;transform:scale(1)}}

/* MODE PILL shown in chat */
.mode-pill{display:inline-flex;align-items:center;gap:5px;background:var(--rose-bg);border:1px solid var(--rose-bd);border-radius:12px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--rose);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px;}

/* CARDS */
.cards-out{display:flex;flex-direction:column;}
.out-lead{font-size:13.5px;color:var(--ink2);line-height:1.7;margin-bottom:16px;font-style:italic;}

.ccard{background:var(--bg);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px;transition:box-shadow 0.15s;}
.ccard:hover{box-shadow:0 4px 20px rgba(14,14,12,0.08);}

.ctop{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);}
.ctags{display:flex;gap:6px;}
.tag{font-size:10px;font-weight:600;letter-spacing:0.6px;text-transform:uppercase;padding:3px 10px;border-radius:20px;background:var(--white);border:1px solid var(--border);color:var(--ink2);}
.tag.r{background:var(--rose-bg);border-color:var(--rose-bd);color:var(--rose);}
.cnum{font-size:11px;color:var(--ink3);}

/* IMAGE */
.izone{width:100%;aspect-ratio:1/1;background:var(--border);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);}
.izone.story{aspect-ratio:9/16;max-height:400px;}
.izone img{width:100%;height:100%;object-fit:cover;display:block;animation:fi 0.4s ease;}
@keyframes fi{from{opacity:0}to{opacity:1}}
.igen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--ink3);}
.ibar{width:100px;height:2px;background:rgba(14,14,12,0.08);border-radius:2px;overflow:hidden;}
.ibar-f{height:100%;background:var(--rose);border-radius:2px;animation:ib 2s ease-in-out infinite;}
@keyframes ib{0%{width:0}70%{width:88%}100%{width:88%;opacity:0.3}}
.igen span{font-size:10px;font-weight:500;letter-spacing:0.3px;}
.iacts{position:absolute;bottom:10px;right:10px;display:flex;gap:6px;opacity:0;transition:opacity 0.15s;}
.izone:hover .iacts{opacity:1;}
.iact{display:flex;align-items:center;gap:4px;background:rgba(14,14,12,0.72);backdrop-filter:blur(8px);border:none;border-radius:7px;padding:5px 10px;font-size:10px;font-weight:600;color:white;cursor:pointer;font-family:'Satoshi',sans-serif;transition:background 0.12s;}
.iact:hover{background:rgba(14,14,12,0.9);}
.ierr{font-size:11px;color:var(--ink3);display:flex;flex-direction:column;align-items:center;gap:6px;}
.ierr button{background:none;border:none;color:var(--rose);cursor:pointer;font-size:11px;font-weight:600;font-family:inherit;}

/* CARD BODY */
.cbody{padding:18px;display:flex;flex-direction:column;gap:14px;}
.crow{display:flex;flex-direction:column;gap:4px;}
.clbl{font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink3);}
.chook{font-family:'Clash Display',sans-serif;font-size:22px;font-weight:500;line-height:1.1;letter-spacing:-0.8px;color:var(--ink);}
.csub{font-size:13px;font-weight:500;color:var(--rose);margin-top:1px;}
.ccopy{font-size:13px;color:var(--ink2);line-height:1.8;}
.ccta{display:inline-flex;align-items:center;gap:8px;background:var(--ink);border-radius:10px;padding:10px 16px;width:fit-content;}
.ccta-t{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#F9F9F7;}
.cwhy{font-size:11.5px;color:var(--ink3);line-height:1.65;font-style:italic;padding-top:12px;border-top:1px solid var(--border);}

.cfoot{display:flex;justify-content:flex-end;padding:10px 18px;border-top:1px solid var(--border);}
.cbtn{display:flex;align-items:center;gap:5px;background:var(--white);border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--ink2);cursor:pointer;transition:all 0.12s;font-family:'Satoshi',sans-serif;}
.cbtn:hover{border-color:var(--border2);color:var(--ink);}
.cbtn.ok{color:var(--green);border-color:rgba(22,163,74,0.25);}
.hint{font-size:11px;color:var(--ink3);text-align:center;padding:4px 0 8px;letter-spacing:0.2px;}

/* INPUT */
.input-wrap{flex-shrink:0;max-width:720px;width:100%;margin:0 auto;padding:10px 28px 18px;}

/* MODE BAR inside input area */
.mode-bar{display:flex;gap:6px;margin-bottom:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.mode-bar::-webkit-scrollbar{display:none;}
.mbtn{display:flex;align-items:center;gap:5px;padding:5px 12px;background:var(--white);border:1.5px solid var(--border);border-radius:20px;font-size:11.5px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all 0.15s;font-family:'Satoshi',sans-serif;white-space:nowrap;flex-shrink:0;}
.mbtn:hover{border-color:var(--border2);color:var(--ink);}
.mbtn.on{background:var(--ink);border-color:var(--ink);color:white;}
.mbtni{font-size:13px;}

.input-box{display:flex;align-items:flex-end;gap:8px;background:var(--white);border:1.5px solid var(--border2);border-radius:var(--r);padding:12px 12px 12px 18px;box-shadow:0 4px 24px rgba(14,14,12,0.08),0 1px 4px rgba(14,14,12,0.04);transition:border-color 0.2s;}
.input-box:focus-within{border-color:var(--ink);}
#p{flex:1;background:none;border:none;outline:none;font-family:'Satoshi',sans-serif;font-size:14px;color:var(--ink);resize:none;line-height:1.6;max-height:120px;overflow-y:auto;min-height:22px;}
#p::placeholder{color:var(--ink3);}
.go{width:36px;height:36px;background:var(--ink);border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.18s;}
.go:hover{background:var(--rose);transform:scale(1.06);}
.go:disabled{opacity:0.2;cursor:not-allowed;transform:none;}
.go svg{width:15px;height:15px;}
.ihint{text-align:center;margin-top:7px;font-size:11px;color:var(--ink3);}

@media(max-width:600px){
  header{padding:0 16px;}
  .msgs,.input-wrap{padding-left:16px;padding-right:16px;}
  .empty{padding:28px 16px;}
  .chook{font-size:18px;}
  .izone.story{max-height:300px;}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="lmark">
      <svg viewBox="0 0 15 15" fill="none">
        <path d="M7.5 1.5L1 5.5V14h4v-4h5v4h4V5.5L7.5 1.5z" fill="white" opacity="0.92"/>
        <circle cx="11" cy="3.5" r="2" fill="#E8412A"/>
      </svg>
    </div>
    <span class="lname">Creative Flywheel</span>
  </div>
  <div class="hstatus"><div class="hdot"></div>Live</div>
</header>

<div class="body" id="body">

  <!-- EMPTY STATE -->
  <div class="empty" id="empty">
    <h1 class="etitle">Your ads should evolve<br>faster than they <em>fatigue.</em></h1>
    <p class="esub">Pick a mode, describe what you need, and get real ad images with copy — ready to test.</p>

    <div>
      <div class="modes-label" style="text-align:center;margin-bottom:10px;">Choose a mode</div>
      <div class="modes" id="emptyModes">
        <button class="mode active" data-mode="refresh" onclick="setMode('refresh',this)">
          <span class="mode-icon">🔄</span> Refresh
        </button>
        <button class="mode" data-mode="innovate" onclick="setMode('innovate',this)">
          <span class="mode-icon">🔥</span> Innovate
        </button>
        <button class="mode" data-mode="ab" onclick="setMode('ab',this)">
          <span class="mode-icon">🧪</span> A/B Batch
        </button>
        <button class="mode" data-mode="seasonal" onclick="setMode('seasonal',this)">
          <span class="mode-icon">📅</span> Seasonal
        </button>
        <button class="mode" data-mode="ugc" onclick="setMode('ugc',this)">
          <span class="mode-icon">📱</span> UGC
        </button>
      </div>
    </div>

    <p id="modeDesc" style="font-size:13px;color:var(--ink3);max-width:340px;line-height:1.6;min-height:36px;transition:opacity 0.2s;"></p>
  </div>

  <div class="msgs" id="msgs" style="display:none;"></div>
</div>

<!-- INPUT -->
<div class="input-wrap">
  <!-- mode bar -->
  <div class="mode-bar" id="modeBar">
    <button class="mbtn on" data-mode="refresh" onclick="setMode('refresh',this)"><span class="mbtni">🔄</span> Refresh</button>
    <button class="mbtn" data-mode="innovate" onclick="setMode('innovate',this)"><span class="mbtni">🔥</span> Innovate</button>
    <button class="mbtn" data-mode="ab" onclick="setMode('ab',this)"><span class="mbtni">🧪</span> A/B Batch</button>
    <button class="mbtn" data-mode="seasonal" onclick="setMode('seasonal',this)"><span class="mbtni">📅</span> Seasonal</button>
    <button class="mbtn" data-mode="ugc" onclick="setMode('ugc',this)"><span class="mbtni">📱</span> UGC</button>
  </div>
  <div class="input-box">
    <textarea id="p" placeholder="Describe the service, client, offer, or what's fatiguing..." rows="1" onkeydown="onk(event)" oninput="rst(this)"></textarea>
    <button class="go" id="go" onclick="send()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M8 13V3M3 8l5-5 5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
  <div class="ihint">↵ to generate · reply to refine or push further</div>
</div>

<script>
const IDEOGRAM_KEY = '682GtwPvWEg8rp8TjIQJSuM-wFHzwSLgnvgAipeVqvr39ntZZG8Jq1BC4mHbtLZNATIktH328EaAeuLB9BeBiw';

const MODES = {
  refresh: {
    label: 'Refresh',
    icon: '🔄',
    desc: 'Same winning angles, fresh execution. Replace fatiguing ads without abandoning what works.',
    system: `You are refreshing fatiguing ads. Keep the same proven angles and offer structures but execute them with completely new hooks, visuals, and energy. Don't reinvent the wheel — just make it feel brand new. Generate 3 variations.`
  },
  innovate: {
    label: 'Innovate',
    icon: '🔥',
    desc: 'No rules. Push way outside the obvious. Find angles nobody else is running.',
    system: `You are in full creative innovation mode. Ignore conventional med spa ads completely. Find angles that are surprising, culturally sharp, emotionally unexpected, or even uncomfortable. Humor, identity, anti-ad energy, raw honesty — anything that stops a scroll in a way nobody else is doing. Generate 4 bold variations, each completely different.`
  },
  ab: {
    label: 'A/B Batch',
    icon: '🧪',
    desc: 'Systematic variations that isolate one variable at a time — hook, visual, CTA, angle.',
    system: `You are building a structured A/B test batch. Generate exactly 4 variations that are INTENTIONALLY similar except for ONE changing variable each time. Label each clearly: Variation A (hook test), Variation B (CTA test), Variation C (visual test), Variation D (angle test). This is for systematic split testing.`
  },
  seasonal: {
    label: 'Seasonal',
    icon: '📅',
    desc: 'Hook into the current cultural moment, season, or upcoming holiday.',
    system: `You are building seasonally-timed ad creatives. Hook into the current cultural moment — the season, upcoming holidays, cultural events, or timely emotions (summer body confidence, New Year energy, Valentine's self-love, holiday gifting, back-to-school, etc.). Make the timing feel urgent and relevant. Generate 3 variations with strong seasonal hooks.`
  },
  ugc: {
    label: 'UGC',
    icon: '📱',
    desc: 'Raw, authentic, creator-style content that feels real — not polished ad creative.',
    system: `You are creating UGC-style (User Generated Content) video concepts. These should feel completely authentic — like a real customer, influencer, or creator filmed it on their phone. No polish. No obvious ad energy. Think: talking to camera, before/after reveal, "I tried it so you don't have to", reaction videos, honest testimonials, day-in-the-life. The visual brief should describe a genuine, unpolished UGC scene. Generate 3 UGC concepts with video scripts.`
  }
};

const BASE_SYS = `You are Creative Flywheel — an autonomous ad creative engine for med spas. You generate high-converting Meta ad concepts with real images.

PROVEN PATTERNS:
- Bold offer hooks: "$749. Unlimited. 1 Year. Done."
- Pain-first: "You've tried waxing. You've tried shaving. Let's end this."
- Specific proof: "4,200+ treatments" not "experienced team"
- Pattern interrupts, humor, rawness, counterintuition
- Real urgency: seasonal, limited slots, intro pricing
- Micro-testimonials as hooks: "I can't believe I waited this long"

CRITICAL — The imagePrompt field is sent directly to an image generation AI. Write it as a detailed, vivid image prompt:
- Exactly what the scene looks like
- Model description, pose, expression, setting
- The TEXT that appears on the image (written out exactly)
- Color palette, lighting, composition
- Mood and aesthetic
- Specify "Meta ad" or "Instagram ad" format

Respond with ONE punchy sentence then EXACTLY:

INTRO: [one sentence]

\`\`\`json
[{"variation":1,"format":"static|story|carousel","angle":"label","hook":"max 8 words ON the ad","subheadline":"offer/supporting line max 12 words","bodyCopy":"2-4 sentence caption, human voice, not AI-sounding","cta":"button text","imagePrompt":"detailed image generation prompt — describe the full scene, text overlays ON the image, colors, lighting, model, mood, composition. Be specific. Example: Close-up of a laughing woman in her 30s, smooth bare legs in frame, bright airy studio with white backdrop, bold black sans-serif text overlay reads DONE WITH RAZORS. bottom text in smaller font: $749 · Unlimited · 1 Year. Clean Instagram ad aesthetic, natural lighting, photorealistic","whyItWorks":"specific psychological reason this converts"}]
\`\`\`

Follow-ups: chat naturally + updated creatives in same format. Plain questions: just answer.`;

let hist = [], busy = false, activeMode = 'refresh';

const modeDescs = {
  refresh: 'Same winning angles, fresh execution. Replace fatiguing ads without abandoning what works.',
  innovate: 'No rules. Push way outside the obvious. Find angles nobody else is running.',
  ab: 'Systematic variations that isolate one variable at a time — hook, visual, CTA, angle.',
  seasonal: 'Hook into the current cultural moment, season, or upcoming holiday.',
  ugc: 'Raw, authentic, creator-style content that feels real — not polished ad creative.'
};

// Set mode on load
updateModeDesc();

function setMode(mode, el) {
  activeMode = mode;
  // Update empty state buttons
  document.querySelectorAll('#emptyModes .mode').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  // Update mode bar
  document.querySelectorAll('#modeBar .mbtn').forEach(b => b.classList.toggle('on', b.dataset.mode === mode));
  updateModeDesc();
  document.getElementById('p').focus();
}

function updateModeDesc() {
  const el = document.getElementById('modeDesc');
  if (el) { el.style.opacity = '0'; setTimeout(() => { el.textContent = modeDescs[activeMode] || ''; el.style.opacity = '1'; }, 150); }
}

function rst(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function onk(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function unesc(s) {
  return String(s).replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"');
}

function scrollEnd() { setTimeout(() => { const b = document.getElementById('body'); b.scrollTop = b.scrollHeight; }, 80); }

function showMsgs() {
  document.getElementById('empty').style.display = 'none';
  const m = document.getElementById('msgs');
  m.style.display = 'flex'; m.style.flexDirection = 'column'; m.style.gap = '24px';
}

function addUser(txt) {
  showMsgs();
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="who">You</div><div class="ubub">${esc(txt)}</div>`;
  document.getElementById('msgs').appendChild(el);
  scrollEnd();
}

function addSpin(mode) {
  const el = document.createElement('div');
  el.className = 'msg ai'; el.id = 'spin';
  const m = MODES[mode] || MODES.refresh;
  el.innerHTML = `<div class="who">Creative Flywheel</div>
    <div class="think">
      <div class="dots"><span></span><span></span><span></span></div>
      <span id="stxt">${m.icon} ${m.label} mode — generating...</span>
    </div>`;
  document.getElementById('msgs').appendChild(el);
  scrollEnd();
  const lines = [
    `${m.icon} ${m.label} mode — generating...`,
    'Writing copy and image prompts...',
    'Building your creative batch...',
    'Almost ready...'
  ];
  let i = 0;
  el._t = setInterval(() => { i = (i+1) % lines.length; const t = document.getElementById('stxt'); if(t) t.textContent = lines[i]; }, 1800);
  return el;
}

function addAI(content, mode) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.innerHTML = `<div class="who">Creative Flywheel</div><div class="abub">${parse(content, mode)}</div>`;
  document.getElementById('msgs').appendChild(el);
  scrollEnd();
}

function parse(content, mode) {
  const m = content.match(/INTRO:\s*([\s\S]*?)```json\s*([\s\S]*?)```/);
  if (m) {
    let cards;
    try { cards = JSON.parse(m[2].trim()); } catch { return `<div style="font-size:14px;line-height:1.75">${esc(content)}</div>`; }
    return render(m[1].trim(), cards, mode);
  }
  return `<div style="font-size:14px;line-height:1.75;color:var(--ink2)">${esc(content)}</div>`;
}

const FL = { static:'Static', story:'Story', carousel:'Carousel', video:'Video' };

function render(intro, cards, mode) {
  const m = MODES[mode] || MODES.refresh;
  const ts = Date.now();

  const html = cards.map((c, i) => {
    const id = `cc${ts}${i}`;
    const fmt = c.format || 'static';
    const isStory = fmt === 'story';

    return `
    <div class="ccard" id="${id}" data-prompt="${esc(c.imagePrompt||c.hook+' med spa Meta ad')}" data-aspect="${isStory ? 'ASPECT_9_16' : 'ASPECT_1_1'}">
      <div class="ctop">
        <div class="ctags">
          <span class="tag r">${m.icon} ${m.label}</span>
          <span class="tag">${FL[fmt]||fmt}</span>
          <span class="tag">${esc(c.angle||'')}</span>
        </div>
        <span class="cnum">0${i+1}</span>
      </div>

      <div class="izone${isStory?' story':''}" id="iz-${id}">
        <div class="igen" id="ig-${id}">
          <div class="ibar"><div class="ibar-f"></div></div>
          <span>Generating image...</span>
        </div>
        <div class="iacts">
          <button class="iact" onclick="dlImg('${id}')">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 8l4 4 4-4M2 14h12" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Download
          </button>
          <button class="iact" onclick="regenImg('${id}')">
            <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M2 8a6 6 0 0110.5-4M14 8a6 6 0 01-10.5 4" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>
            Retry
          </button>
        </div>
      </div>

      <div class="cbody">
        <div class="crow">
          <div class="clbl">Headline</div>
          <div class="chook">${esc(c.hook||'')}</div>
          ${c.subheadline ? `<div class="csub">${esc(c.subheadline)}</div>` : ''}
        </div>
        <div class="crow">
          <div class="clbl">Caption</div>
          <div class="ccopy">${esc(c.bodyCopy||'')}</div>
        </div>
        <div class="crow">
          <div class="clbl">CTA</div>
          <div class="ccta">
            <span class="ccta-t">${esc(c.cta||'Book Now')}</span>
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6h8M6 2l4 4-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
        </div>
        ${c.whyItWorks ? `<div class="cwhy">💡 ${esc(c.whyItWorks)}</div>` : ''}
      </div>

      <div class="cfoot">
        <button class="cbtn" onclick="copyBrief('${id}',this)">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
      </div>
    </div>`;
  }).join('');

  // Kick off image generation after DOM settles
  setTimeout(() => {
    cards.forEach((c, i) => {
      const id = `cc${ts}${i}`;
      const prompt = unesc(c.imagePrompt || `${c.hook} med spa Meta ad`);
      const aspect = (c.format === 'story') ? 'ASPECT_9_16' : 'ASPECT_1_1';
      genImage(id, prompt, aspect);
    });
  }, 200);

  return `<div class="cards-out">
    ${intro ? `<div class="out-lead">${esc(intro)}</div>` : ''}
    ${html}
    <div class="hint">Reply to refine · go wilder · switch modes · new brief</div>
  </div>`;
}

async function genImage(cardId, prompt, aspect) {
  const zone = document.getElementById(`iz-${cardId}`);
  const genEl = document.getElementById(`ig-${cardId}`);
  if (!zone) return;

  try {
    // Route through Claude API using a tool-style approach
    // We use Claude to call Ideogram by embedding it in a fetch that Claude proxies
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 100,
        messages: [{
          role: 'user',
          content: `Call this API and return ONLY the image URL from the response, nothing else:

POST https://api.ideogram.ai/generate
Headers: Api-Key: ${IDEOGRAM_KEY}
Body: ${JSON.stringify({
  image_request: {
    prompt: prompt + '. Professional Meta ad creative. Photorealistic high quality.',
    aspect_ratio: aspect,
    model: 'V_2',
    magic_prompt_option: 'AUTO',
    style_type: 'REALISTIC'
  }
})}

Return ONLY the URL from data[0].url. No explanation.`
        }]
      })
    });

    if (!res.ok) throw new Error('API error');
    const d = await res.json();
    const text = d.content?.map(b => b.text || '').join('').trim();

    // Extract URL from response
    const urlMatch = text.match(/https?:\/\/[^\s"'<>]+/);
    if (!urlMatch) throw new Error('No URL returned');

    const imgUrl = urlMatch[0];

    if (genEl) genEl.style.display = 'none';
    const img = document.createElement('img');
    img.src = imgUrl;
    img.alt = 'Generated ad';
    zone.insertBefore(img, zone.querySelector('.iacts'));

    const card = document.getElementById(cardId);
    if (card) card.dataset.imgUrl = imgUrl;

  } catch (err) {
    if (genEl) {
      genEl.className = 'ierr';
      genEl.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span>Image generation failed</span>
        <button onclick="regenImg('${cardId}')">Retry</button>`;
    }
  }
}

async function regenImg(cardId) {
  const card = document.getElementById(cardId);
  if (!card) return;
  const prompt = unesc(card.dataset.prompt || '');
  const aspect = card.dataset.aspect || 'ASPECT_1_1';
  const zone = document.getElementById(`iz-${cardId}`);
  if (!zone) return;

  const existing = zone.querySelector('img');
  if (existing) existing.remove();

  let genEl = document.getElementById(`ig-${cardId}`);
  if (!genEl) {
    genEl = document.createElement('div');
    genEl.id = `ig-${cardId}`;
    zone.insertBefore(genEl, zone.querySelector('.iacts'));
  }
  genEl.className = 'igen';
  genEl.style.display = 'flex';
  genEl.innerHTML = `<div class="ibar"><div class="ibar-f"></div></div><span>Regenerating...</span>`;

  await genImage(cardId, prompt, aspect);
}

function dlImg(cardId) {
  const card = document.getElementById(cardId);
  const url = card?.dataset?.imgUrl || card?.querySelector('img')?.src;
  if (!url) return;
  window.open(url, '_blank');
}

function copyBrief(cardId, btn) {
  const c = document.getElementById(cardId);
  const h = c.querySelector('.chook')?.innerText || '';
  const s = c.querySelector('.csub')?.innerText || '';
  const b = c.querySelector('.ccopy')?.innerText || '';
  const cta = c.querySelector('.ccta-t')?.innerText?.trim() || '';
  navigator.clipboard.writeText(`HEADLINE: ${h}${s?'\nSUBHEAD: '+s:''}\n\nCAPTION:\n${b}\n\nCTA: ${cta}`).then(() => {
    btn.classList.add('ok'); btn.innerHTML = '✓ Copied';
    setTimeout(() => {
      btn.classList.remove('ok');
      btn.innerHTML = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy`;
    }, 2000);
  });
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('p');
  const txt = inp.value.trim();
  if (!txt) return;

  busy = true;
  inp.value = ''; inp.style.height = 'auto';
  document.getElementById('go').disabled = true;

  const mode = activeMode;
  const m = MODES[mode] || MODES.refresh;
  addUser(txt);
  hist.push({ role: 'user', content: `[Mode: ${m.label}] ${txt}` });

  const spin = addSpin(mode);

  try {
    const fullSystem = BASE_SYS + '\n\nCURRENT MODE INSTRUCTIONS:\n' + m.system;

    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        system: fullSystem,
        messages: hist
      })
    });

    clearInterval(spin._t); spin.remove();
    if (!r.ok) { const e = await r.json(); throw new Error(e.error?.message || 'API error'); }

    const d = await r.json();
    const reply = d.content.map(b => b.text || '').join('');
    hist.push({ role: 'assistant', content: reply });
    addAI(reply, mode);

  } catch (err) {
    clearInterval(spin._t); spin.remove();
    addAI(`Something went wrong: ${err.message}`, mode);
  } finally {
    busy = false;
    document.getElementById('go').disabled = false;
    inp.focus();
  }
}
</script>
